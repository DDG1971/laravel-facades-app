services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../laravel:/var/www/html
    depends_on:
      - db
    networks:
      - laravel-network
    restart: unless-stopped

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: stylefasad
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - laravel-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../laravel:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel-network
    restart: unless-stopped

  maildev:
    image: maildev/maildev
    restart: unless-stopped

    ports:
      - "2080:1080"
      - "2025:1025"
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
    networks:
      - laravel-network
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: php artisan queue:work
    volumes:
      - ../laravel:/var/www/html
    depends_on:
      - app
      - db
    networks:
      - laravel-network
    restart: unless-stopped

networks:
  laravel-network:
    driver: bridge


volumes:
  db_data: